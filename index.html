<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Prediction</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Student Result Prediction</h1>
    <form id="marksForm">
        <label for="maths">Mathematics:</label>
        <input type="number" id="maths" name="maths" min="0" max="100" required><br><br>

        <label for="physics">Physical Sciences:</label>
        <input type="number" id="physics" name="physics" min="0" max="100" required><br><br>

        <label for="biology">Life Sciences:</label>
        <input type="number" id="biology" name="biology" min="0" max="100" required><br><br>

        <label for="geography">Geography:</label>
        <input type="number" id="geography" name="geography" min="0" max="100" required><br><br>

        <label for="english">English:</label>
        <input type="number" id="english" name="english" min="0" max="100" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <div id="result">
        <h2>Prediction Results</h2>
        <p id="prediction"></p>
        <div id="inputValues"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
